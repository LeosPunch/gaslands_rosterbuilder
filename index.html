<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Vehicle Builder</title>
<style>
body { font-family: Arial; background:#1e1e1e; color:#fff; padding:20px; }
input { margin:5px; padding:5px; }
button { margin:5px; padding:5px 10px; cursor:pointer; }
.unit { border:1px solid #555; padding:10px; margin-top:10px; }
.block { margin-bottom:5px; }
</style>
</head>

<body>

<h1>Конструктор ростера</h1>

<h3>Машина</h3>
<input id="vehicleInput" list="vehicleList" oninput="calculateCurrent()">
<datalist id="vehicleList"></datalist>

<h3>Оружие экипажа</h3>
<div id="crewWeapons"></div>
<button onclick="addCrewWeapon()">+ экипаж</button>

<h3>Оружие</h3>
<div id="weapons"></div>
<button onclick="addWeapon()">+ оружие</button>

<h3>Усовершенствования</h3>
<div id="upgrades"></div>
<button onclick="addUpgrade()">+ апгрейд</button>

<h2>Стоимость машинки: <span id="currentCost">0</span></h2>
<h2>Занятые слоты: <span id="slots">0/0</span></h2>

<br>
<button onclick="addUnit()">Добавить</button>
<button onclick="copyRoster()">Скопировать ростер</button>

<h2>Ростер</h2>
<div id="roster"></div>

<h2>Общая стоимость: <span id="total">0</span></h2>

<datalist id="weaponList"></datalist>
<datalist id="crewList"></datalist>
<datalist id="upgradeList"></datalist>

<script>
// ===== БАЗЫ =====
const vehicles = {
    "Багги": { cost:6, slots:2 },
    "Легковушка": { cost:12, slots:2 },
    "Джип/Пикап": { cost:15, slots:3 },
    "Гоночная машина": { cost:15, slots:2 },
    "Грузовик/Фургон": { cost:15, slots:3 },
    "Тяжелый грузовик": { cost:25, slots:5 },
    "Автобус": { cost:30, slots:3 },
    "Бронетранспортер": { cost:35, slots:1 },
    "Драгстер": { cost:5, slots:2 },
    "Мотоцикл": { cost:5, slots:1 },
    "Мотоцикл с коляской": { cost:8, slots:2 },
    "Фургон мороженщика": { cost:8, slots:2 },
    "Автожир": { cost:10, slots:0 },
    "Скорая помощь": { cost:20, slots:3 },
    "Техпомощь": { cost:25, slots:3 },
    "Монстр-трак": { cost:25, slots:2 },
    "Вертолет": { cost:30, slots:4 },
    "Танк": { cost:40, slots:4 },
    "Бронефура": { cost:40, slots:5 }
};

const crewWeaponsDB = {
    "Пистолет": { cost:0 },
    "Обрез двустволки": { cost:2 },
    "Газовые Гранаты": { cost:1 },
    "Гранаты": { cost:1 },
    "Магнум": { cost:3 },
    "Коктейли Молотова": { cost:1 },
    "Дробовик": { cost:4 },
    "Стальные Сети": { cost:2 },
    "Пистолет-Пулемет": { cost:5 }
};

const weaponsDB = {
    "Пулемет": { cost:2, slots:1 },
    "Тяжелый Пулемет": { cost:3, slots:1 },
    "Гатлинг": { cost:5, slots:1 },
    "125мм Пушка": { cost:6, slots:3 },
    "Молниевая Пушка": { cost:6, slots:2 },
    "Гранатомет": { cost:4, slots:2 },
    "BFG": { cost:1, slots:3 },
    "Лазер": { cost:5, slots:1 },
    "Луч Смерти": { cost:3, slots:1 },
    "Огнемет": { cost:4, slots:2 },
    "Манипулятор": { cost:6, slots:1 },
    "Гравипушка": { cost:2, slots:1 },
    "Гарпун": { cost:2, slots:1 },
    "Кинетический ускоритель": { cost:6, slots:2 },
    "Магнитная глушилка": { cost:2, slots:0 },
    "Миномет": { cost:4, slots:1 },
    "Ракеты": { cost:5, slots:2 },
    "Металлоломомет": { cost:4, slots:4 },
    "Металлоломобол": { cost:2, slots:3 },
    "Шипы": { cost:1, slots:1 },
    "Клей": { cost:1, slots:1 },
    "Мины": { cost:1, slots:1 },
    "Напалм": { cost:1, slots:1 },
    "Машинное Масло": { cost:2, slots:0 },
    "Радиоуправляемые бомбы": { cost:3, slots:0 },
    "Переносная Турель": { cost:3, slots:0 },
    "Дымовая бомба": { cost:1, slots:0 }
};

const upgradesDB = {
    "Дополнительные бронелисты": { cost:4, slots:1 },
    "Ядерный двигатель": { cost:5, slots:0 },
    "Экспериментальный Телепорт": { cost:7, slots:0 },
    "Взрывающийся таран": { cost:3, slots:0 },
    "Дополнительный член экипажа": { cost:4, slots:0 },
    "Самодельная катапульта": { cost:2, slots:1 },
    "Азотный Ускоритель": { cost:6, slots:0 },
    "Таран": { cost:4, slots:1 },
    "Каркас Безопасности": { cost:4, slots:1 },
    "Гусеницы": { cost:4, slots:1 },
    "Турель": { cost:0, slots:0 }
};

// ===== УТИЛИТЫ =====
function findInDB(input, db){
    const clean = input.split("[")[0].trim().toLowerCase();
    return Object.keys(db).find(k=>k.toLowerCase()===clean);
}

function getMaxWeaponCost(){
    let max = 0;
    document.querySelectorAll("#weapons input").forEach(i=>{
        const key=findInDB(i.value, weaponsDB);
        if(key) max = Math.max(max, weaponsDB[key].cost);
    });
    return max;
}

function fill(id, db){
    const list=document.getElementById(id);
    list.innerHTML="";
    Object.keys(db).forEach(k=>{
        let o=document.createElement("option");
        o.value = `${k} [${db[k].cost}]`;
        list.appendChild(o);
    });
}

function updateTurretCost(){
    const maxWeapon = getMaxWeaponCost();
    const list=document.getElementById("upgradeList");
    list.innerHTML="";
    Object.keys(upgradesDB).forEach(k=>{
        let o=document.createElement("option");
        let cost = (k==="Турель") ? maxWeapon*2 : upgradesDB[k].cost;
        o.value = `${k} [${cost}]`;
        list.appendChild(o);
    });
}

function calculateSlots(){
    let used = 0;
    let max = 0;

    const vKey=findInDB(vehicleInput.value, vehicles);
    if(vKey) max = vehicles[vKey].slots;

    document.querySelectorAll("#weapons input").forEach(i=>{
        const key=findInDB(i.value, weaponsDB);
        if(key) used += weaponsDB[key].slots || 0;
    });

    document.querySelectorAll("#upgrades input").forEach(i=>{
        const key=findInDB(i.value, upgradesDB);
        if(key) used += upgradesDB[key].slots || 0;
    });

    document.getElementById("slots").innerText = `${used}/${max}`;
    return {used, max};
}

// ===== ПОДСЧЁТ =====
function calculateCurrent(){
    let cost = 0;

    const vKey=findInDB(vehicleInput.value, vehicles);
    if(vKey) cost += vehicles[vKey].cost;

    document.querySelectorAll("#crewWeapons input").forEach(i=>{
        const key=findInDB(i.value, crewWeaponsDB);
        if(key) cost += crewWeaponsDB[key].cost;
    });

    document.querySelectorAll("#weapons input").forEach(i=>{
        const key=findInDB(i.value, weaponsDB);
        if(key) cost += weaponsDB[key].cost;
    });

    const maxWeapon = getMaxWeaponCost();

    document.querySelectorAll("#upgrades input").forEach(i=>{
        const key=findInDB(i.value, upgradesDB);
        if(key){
            cost += (key==="Турель") ? maxWeapon*2 : upgradesDB[key].cost;
        }
    });

    document.getElementById("currentCost").innerText = cost;
    calculateSlots();
    updateTurretCost();
}

// ===== UI =====
function addWeapon(){
    let d=document.createElement("div");
    d.className="block";
    d.innerHTML=`<input list="weaponList" oninput="calculateCurrent()">`;
    weapons.appendChild(d);
}

function addCrewWeapon(){
    let d=document.createElement("div");
    d.className="block";
    d.innerHTML=`<input list="crewList" oninput="calculateCurrent()">`;
    crewWeapons.appendChild(d);
}

function addUpgrade(){
    let d=document.createElement("div");
    d.className="block";
    d.innerHTML=`<input list="upgradeList" oninput="calculateCurrent()">`;
    upgrades.appendChild(d);
}

// ===== ЛОГИКА =====
let total=0;

function addUnit(){
    let cost=0;
    let text="";

    const slotsData = calculateSlots();
    if(slotsData.used > slotsData.max){
        alert("Слишком много слотов занято");
        return;
    }

    const vKey=findInDB(vehicleInput.value, vehicles);
    if(!vKey) return alert("Нет машины");

    cost+=vehicles[vKey].cost;
    text+=`${vKey} [${vehicles[vKey].cost}]\n`;

    let crewAdded=false;
    document.querySelectorAll("#crewWeapons input").forEach(i=>{
        const key=findInDB(i.value, crewWeaponsDB);
        if(key){
            crewAdded=true;
            cost+=crewWeaponsDB[key].cost;
            text+=`Экипаж: ${key} [${crewWeaponsDB[key].cost}]\n`;
        }
    });

    if(!crewAdded){
        text+=`Экипаж: Пистолет [0]\n`;
    }

    document.querySelectorAll("#weapons input").forEach(i=>{
        const key=findInDB(i.value, weaponsDB);
        if(key){
            cost+=weaponsDB[key].cost;
            text+=`Оружие: ${key} [${weaponsDB[key].cost}]\n`;
        }
    });

    const maxWeapon = getMaxWeaponCost();

    document.querySelectorAll("#upgrades input").forEach(i=>{
        const key=findInDB(i.value, upgradesDB);
        if(key){
            let uCost = key==="Турель" ? maxWeapon*2 : upgradesDB[key].cost;
            cost+=uCost;
            text+=`Апгрейд: ${key} [${uCost}]\n`;
        }
    });

    let div=document.createElement("div");
    div.className="unit";
    div.innerText=text;

    let btn=document.createElement("button");
    btn.innerText="Удалить";
    btn.onclick=function(){
        total-=cost;
        document.getElementById("total").innerText=total;
        div.remove();
    };

    div.appendChild(btn);
    roster.appendChild(div);

    total+=cost;
    document.getElementById("total").innerText=total;

    clearAll();
    calculateCurrent();
}

// ===== КОПИРОВАНИЕ =====
function copyRoster(){
    let text = "";

    document.querySelectorAll(".unit").forEach(u=>{
        text += u.innerText.replace("Удалить","").trim() + "\n\n";
    });

    text += "Общая стоимость: " + total;

    navigator.clipboard.writeText(text);
    alert("Ростер скопирован");
}

function clearAll(){
    document.querySelectorAll("input").forEach(i=>i.value="");
    weapons.innerHTML="";
    upgrades.innerHTML="";
    crewWeapons.innerHTML="";
}

// ===== СТАРТ =====
fill("vehicleList", vehicles);
fill("weaponList", weaponsDB);
fill("crewList", crewWeaponsDB);
updateTurretCost();
</script>
</body>
</html>

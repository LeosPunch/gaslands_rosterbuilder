// ===== УТИЛИТЫ =====
function findInDB(input, db){
    const clean = input.split("[")[0].trim().toLowerCase();
    return Object.keys(db).find(k=>k.toLowerCase()===clean);
}

function getAmmo(weaponObj, baseAmmo) {
    if (currentSponsor === "Резерфорд" && baseAmmo === 3) return 4;
    return baseAmmo;
}

function formatRange(range) {
    if (range === 1) return "короткая";
    if (range === 2) return "средняя";
    if (range === 3) return "длинная";
    if (range === 5) return "двойная";
    if (range === "sb") return "малый взрыв";
    if (range === "bb") return "большой взрыв";
    if (range === "drop") return "сброс";
    return range;
}

function formatAttack(attack) {
    if (attack === 0) return "";
    return `${attack}к6`;
}

function formatWeaponText(weapon, key, cost) {
    let parts = [];
    if (weapon.range !== undefined) {
        let rangeStr = formatRange(weapon.range);
        if (rangeStr) parts.push(`Дальность: ${rangeStr}`);
    }
    let attackStr = formatAttack(weapon.attack);
    if (attackStr) parts.push(`Атака: ${attackStr}`);
    if (weapon.ammo !== undefined) {
        parts.push(`Боеприпасы: ${getAmmo(weapon, weapon.ammo)}`);
    }
    if (weapon.rules && weapon.rules.trim() !== "") {
        parts.push(weapon.rules);
    }
    let suffix = parts.length ? ` (${parts.join(", ")})` : "";
    return `${key} [${cost}]${suffix}`;
}

function getUpgradeCost(upgradeKey) {
    if (upgradeKey === "Турель") return getMaxWeaponCost() * 2;
    if (currentSponsor === "Идрис" && upgradeKey === "Азотный Ускоритель") return 3;
    if (currentSponsor === "Скарлетт" && upgradeKey === "Дополнительный член экипажа") return 2;
    if (extraUpgrades[upgradeKey]) return extraUpgrades[upgradeKey].cost;
    return upgradesDB[upgradeKey]?.cost || 0;
}

function getUpgradeSlots(upgradeKey) {
    if (currentSponsor === "Слим" && upgradeKey === "Таран") return 0;
    if (extraUpgrades[upgradeKey]) return extraUpgrades[upgradeKey].slots;
    return upgradesDB[upgradeKey]?.slots || 0;
}

        return currentSponsor === "Резерфорд";
    }
    if (currentSponsor === "Резерфорд") {
        if (vehicleData.mass === 1) return false;
        return true;
    }
    if (currentSponsor === "Миядзаки" && vehicleData.max < 3) return false;
    if (currentSponsor === "Идрис" && vehicleKey === "Автожир") return false;
    return true;
}

function isWeaponAllowed(weaponKey) {
    if (currentSponsor === "Мишкин") return true;
    return !mishkinWeapons.includes(weaponKey);
}

function isUpgradeAllowed(upgradeKey) {
    if (mishkinUpgrades.includes(upgradeKey)) return currentSponsor === "Мишкин";
    if (upgradeKey === "Громкая Сирена" && currentSponsor !== "Дорожный Патруль") return false;
    if (upgradeKey === "Ультралёгкая Броня" && currentSponsor !== "Верн") return false;
    if (upgradeKey.startsWith("Прицеп") && currentSponsor !== "Гонщики-Самогонщики Расти") return false;
    return true;
}

function isSkillAllowed(skillKey) {
    if (currentSponsor === "Без Спонсора") return false;
    const ability = skillsDB[skillKey].ability;
    const sponsor = sponsorsDB[currentSponsor];
    return (sponsor.ability1 === ability || sponsor.ability2 === ability);
}

function getSkillListFiltered() {
    if (currentSponsor === "Без Спонсора") return [];
    return Object.keys(skillsDB).filter(isSkillAllowed);
}

function getVehicleListFiltered() {
    return Object.keys(vehicles).filter(key => isVehicleAllowed(key, vehicles[key]));
}

function getWeaponListFiltered() {
    return Object.keys(weaponsDB).filter(isWeaponAllowed);
}

function getUpgradeListFiltered() {
    let base = Object.keys(upgradesDB).filter(isUpgradeAllowed);
    if (currentSponsor === "Дорожный Патруль") base.push("Громкая Сирена");
    if (currentSponsor === "Верн") base.push("Ультралёгкая Броня");
    if (currentSponsor === "Гонщики-Самогонщики Расти") {
        base.push("Прицеп Лёгкий", "Прицеп Средний", "Прицеп Тяжёлый");
    }
    return base;
}

function updateAllLists() {
    const vehicleList = document.getElementById("vehicleList");
    vehicleList.innerHTML = "";
    getVehicleListFiltered().forEach(k => {
        let o = document.createElement("option");
        o.value = `${k} [${vehicles[k].cost}]`;
        vehicleList.appendChild(o);
    });

    const weaponList = document.getElementById("weaponList");
    weaponList.innerHTML = "";
    getWeaponListFiltered().forEach(k => {
        let o = document.createElement("option");
        o.value = `${k} [${weaponsDB[k].cost}]`;
        weaponList.appendChild(o);
    });

    const crewList = document.getElementById("crewList");
    crewList.innerHTML = "";
    Object.keys(crewWeaponsDB).forEach(k => {
        let o = document.createElement("option");
        o.value = `${k} [${crewWeaponsDB[k].cost}]`;
        crewList.appendChild(o);
    });

    const skillList = document.getElementById("skillList");
    skillList.innerHTML = "";
    getSkillListFiltered().forEach(k => {
        let o = document.createElement("option");
        o.value = `${k} [${skillsDB[k].cost}]`;
        skillList.appendChild(o);
    });

    updateTurretCost();
}

function getMaxWeaponCost(){
    let max = 0;
    document.querySelectorAll("#weapons input").forEach(i=>{
        const key=findInDB(i.value, weaponsDB);
        if(key && isWeaponAllowed(key)) max = Math.max(max, weaponsDB[key].cost);
    });
    return max;
}

function updateTurretCost(){
    const maxWeapon = getMaxWeaponCost();
    const list=document.getElementById("upgradeList");
    list.innerHTML="";
    getUpgradeListFiltered().forEach(k=>{
        let o=document.createElement("option");
        let cost = (k==="Турель") ? maxWeapon*2 : getUpgradeCost(k);
        o.value = `${k} [${cost}]`;
        list.appendChild(o);
    });
}

function calculateSlots(){
    let used = 0;
    let max = 0;
    const vKey=findInDB(vehicleInput.value, vehicles);
    if(vKey && isVehicleAllowed(vKey, vehicles[vKey])) max = vehicles[vKey].slots;
    else max = 0;

    document.querySelectorAll("#weapons input").forEach(i=>{
        const key=findInDB(i.value, weaponsDB);
        if(key && isWeaponAllowed(key)) used += weaponsDB[key].slots || 0;
    });
    document.querySelectorAll("#upgrades input").forEach(i=>{
        const key=findInDB(i.value, upgradesDB);
        if(key && isUpgradeAllowed(key)) used += getUpgradeSlots(key);
        else if (extraUpgrades[key] && isUpgradeAllowed(key)) used += extraUpgrades[key].slots;
    });
    // навыки не занимают слотов
    document.getElementById("slots").innerText = `${used}/${max}`;
    return {used, max};
}

function calculateCurrent(){
    let cost = 0;
    const vKey=findInDB(vehicleInput.value, vehicles);
    if(vKey && isVehicleAllowed(vKey, vehicles[vKey])) cost += vehicles[vKey].cost;

    document.querySelectorAll("#crewWeapons input").forEach(i=>{
        const key=findInDB(i.value, crewWeaponsDB);
        if(key) cost += crewWeaponsDB[key].cost;
    });
    document.querySelectorAll("#weapons input").forEach(i=>{
        const key=findInDB(i.value, weaponsDB);
        if(key && isWeaponAllowed(key)) cost += weaponsDB[key].cost;
    });
    document.querySelectorAll("#upgrades input").forEach(i=>{
        const key=findInDB(i.value, upgradesDB);
        if(key && isUpgradeAllowed(key)) cost += getUpgradeCost(key);
        else if (extraUpgrades[key] && isUpgradeAllowed(key)) cost += extraUpgrades[key].cost;
    });
    document.querySelectorAll("#skills input").forEach(i=>{
        const key=findInDB(i.value, skillsDB);
        if(key && isSkillAllowed(key)) cost += skillsDB[key].cost;
    });
    document.getElementById("currentCost").innerText = cost;
    calculateSlots();
    updateTurretCost();
}

function addWeapon(){
    let d=document.createElement("div");
    d.className="block";
    d.innerHTML=`<input list="weaponList" onfocus="this.value=''; calculateCurrent()" oninput="calculateCurrent()">`;
    weapons.appendChild(d);
}
function addCrewWeapon(){
    let d=document.createElement("div");
    d.className="block";
    d.innerHTML=`<input list="crewList" onfocus="this.value=''; calculateCurrent()" oninput="calculateCurrent()">`;
    crewWeapons.appendChild(d);
}
function addUpgrade(){
    let d=document.createElement("div");
    d.className="block";
    d.innerHTML=`<input list="upgradeList" onfocus="this.value=''; calculateCurrent()" oninput="calculateCurrent()">`;
    upgrades.appendChild(d);
}
function addSkill(){
    let d=document.createElement("div");
    d.className="block";
    d.innerHTML=`<input list="skillList" onfocus="this.value=''; calculateCurrent()" oninput="calculateCurrent()">`;
    skills.appendChild(d);
}

function computeVehicleStats(vehicleKey, upgradeKeys) {
    let base = vehicles[vehicleKey];
    let hull = base.hull;
    let handle = base.handle;
    let maxSpeed = base.max;
    let crew = base.crew;
    upgradeKeys.forEach(upKey => {
        if (upKey === "Дополнительные бронелисты") hull += 2;
        if (upKey === "Ультралёгкая Броня") hull += 2;
        if (upKey === "Ядерный двигатель") maxSpeed += 2;
        if (upKey === "Гусеницы") { handle += 1; maxSpeed -= 1; }
        if (upKey === "Дополнительный член экипажа") crew += 1;
    });
    return { hull, handle, maxSpeed, crew };
}

function addUnit(){
    let cost=0;
    let text="";
    const slotsData = calculateSlots();
    const vKey=findInDB(vehicleInput.value, vehicles);
    if(!vKey || !isVehicleAllowed(vKey, vehicles[vKey])) return alert("Нет машины или она запрещена спонсором");
    if(slotsData.used > slotsData.max){
        alert("Слишком много слотов занято");
        return;
    }
    const vehicleMass = vehicles[vKey].mass;
    let upgradesSelected = [];
    let upgradesKeys = [];
    document.querySelectorAll("#upgrades input").forEach(i=>{
        const key=findInDB(i.value, upgradesDB);
        if(key && isUpgradeAllowed(key)) {
            upgradesSelected.push(key);
            upgradesKeys.push(key);
        } else if (extraUpgrades[key] && isUpgradeAllowed(key)) {
            upgradesSelected.push(key);
            upgradesKeys.push(key);
        }
    });
    if (currentSponsor === "Гонщики-Самогонщики Расти") {
        if (upgradesSelected.includes("Прицеп Средний") && vehicleMass <= 1) return alert("Для Среднего прицепа нужна масса >1");
        if (upgradesSelected.includes("Прицеп Тяжёлый") && vehicleMass <= 2) return alert("Для Тяжёлого прицепа нужна масса >2");
    }

    cost+=vehicles[vKey].cost;
    let stats = computeVehicleStats(vKey, upgradesSelected);
    let rulesText = vehicles[vKey].rules;
    let vehicleInfo = `Прочность: ${stats.hull}, Управляемость ${stats.handle}, Макс. передача ${stats.maxSpeed}, Экипаж ${stats.crew}`;
    if (rulesText && rulesText.trim() !== "") vehicleInfo += `, Правила: ${rulesText}`;
    text+=`${vKey} [${vehicles[vKey].cost}] (${vehicleInfo})\n`;

    let crewAdded=false;
    let crewWeaponsKeys = [];
    document.querySelectorAll("#crewWeapons input").forEach(i=>{
        const key=findInDB(i.value, crewWeaponsDB);
        if(key){
            crewAdded=true;
            let weap = crewWeaponsDB[key];
            cost+=weap.cost;
            text+=`Экипаж: ${formatWeaponText(weap, key, weap.cost)}\n`;
            crewWeaponsKeys.push(key);
        }
    });
    if(!crewAdded){
        text+=`Экипаж: Пистолет [0]\n`;
        crewWeaponsKeys.push("Пистолет");
    }

    let weaponsKeys = [];
    document.querySelectorAll("#weapons input").forEach(i=>{
        const key=findInDB(i.value, weaponsDB);
        if(key && isWeaponAllowed(key)){
            let weap = weaponsDB[key];
            cost+=weap.cost;
            text+=`Оружие: ${formatWeaponText(weap, key, weap.cost)}\n`;
            weaponsKeys.push(key);
        }
    });

    upgradesSelected.forEach(key=>{
        let uCost = getUpgradeCost(key);
        cost+=uCost;
        let rulesTextUp = "";
        if (upgradesDB[key] && upgradesDB[key].rules) rulesTextUp = upgradesDB[key].rules;
        else if (extraUpgrades[key] && extraUpgrades[key].rules) rulesTextUp = extraUpgrades[key].rules;
        else if (key === "Турель") rulesTextUp = "Круговой обстрел.";
        if (rulesTextUp) text+=`Апгрейд: ${key} [${uCost}] (${rulesTextUp})\n`;
        else text+=`Апгрейд: ${key} [${uCost}]\n`;
    });

    let skillsKeys = [];
    document.querySelectorAll("#skills input").forEach(i=>{
        const key=findInDB(i.value, skillsDB);
        if(key && isSkillAllowed(key)){
            let sk = skillsDB[key];
            cost+=sk.cost;
            text+=`Навык: ${key} [${sk.cost}]\n`;
            skillsKeys.push(key);
        }
    });

    let div=document.createElement("div");
    div.className="unit";
    div.innerText=text;
    
    const unitData = {
        vehicleKey: vKey,
        crewWeapons: crewWeaponsKeys,
        weapons: weaponsKeys,
        upgrades: upgradesKeys,
        skills: skillsKeys
    };
    div.dataset.unit = JSON.stringify(unitData);
    
    let btnEdit = document.createElement("button");
    btnEdit.innerText = "Редактировать";
    btnEdit.style.marginRight = "5px";
    btnEdit.onclick = function() { editUnit(div, unitData, cost); };
    let btnDel = document.createElement("button");
    btnDel.innerText = "Удалить";
    btnDel.onclick = function(){
        total-=cost;
        document.getElementById("total").innerText=total;
        div.remove();
    };
    div.appendChild(btnEdit);
    div.appendChild(btnDel);
    
    const rosterDiv = document.getElementById("roster");
    rosterDiv.appendChild(div);
    
    total+=cost;
    document.getElementById("total").innerText=total;
    clearAll();
    calculateCurrent();
}

function editUnit(div, unitData, cost) {
    total -= cost;
    document.getElementById("total").innerText = total;
    div.remove();
    clearAll();
    vehicleInput.value = `${unitData.vehicleKey} [${vehicles[unitData.vehicleKey].cost}]`;
    unitData.crewWeapons.forEach(key => { addCrewWeapon(); document.querySelectorAll("#crewWeapons input").slice(-1)[0].value = `${key} [${crewWeaponsDB[key].cost}]`; });
    unitData.weapons.forEach(key => { addWeapon(); document.querySelectorAll("#weapons input").slice(-1)[0].value = `${key} [${weaponsDB[key].cost}]`; });
    unitData.upgrades.forEach(key => { addUpgrade(); let uCost = getUpgradeCost(key); document.querySelectorAll("#upgrades input").slice(-1)[0].value = `${key} [${uCost}]`; });
    unitData.skills.forEach(key => { addSkill(); document.querySelectorAll("#skills input").slice(-1)[0].value = `${key} [${skillsDB[key].cost}]`; });
    calculateCurrent();
}

function copyRoster(){
    const units = document.querySelectorAll(".unit");
    if (units.length === 0) { alert("Пустой ростер."); return; }
    let text = "";
    document.querySelectorAll("#roster > div").forEach(div => {
        let divText = div.innerText.replace("Удалить", "").replace("Редактировать", "").trim();
        if (divText) text += divText + "\n\n";
    });
    text += "Общая стоимость: " + total;
    navigator.clipboard.writeText(text);
}

function clearAll(){
    document.querySelectorAll("#crewWeapons input, #weapons input, #upgrades input, #skills input").forEach(i=>i.value="");
    weapons.innerHTML="";
    upgrades.innerHTML="";
    crewWeapons.innerHTML="";
    skills.innerHTML="";
    vehicleInput.value = "";
}

function onSponsorChange(){
    currentSponsor = document.getElementById("sponsorSelect").value;
    const rulesDiv = document.getElementById("sponsorRules");
    const sponsorRules = sponsorsDB[currentSponsor]?.rules || "";
    rulesDiv.innerText = sponsorRules;
    
    // Отображение доступных способностей (навыков)
    const abilitiesDiv = document.getElementById("sponsorAbilities");
    if (currentSponsor === "Без Спонсора") {
        abilitiesDiv.innerText = "";
    } else {
        const sponsor = sponsorsDB[currentSponsor];
        abilitiesDiv.innerText = `Навыки: ${sponsor.ability1} и ${sponsor.ability2}`;
    }
    
    // Очищаем ростер и сбрасываем общую стоимость
    total = 0;
    document.getElementById("total").innerText = total;
    const rosterDiv = document.getElementById("roster");
    rosterDiv.innerHTML = "";
    
    let headerText = `Спонсор: ${currentSponsor}`;
    if (sponsorRules && sponsorRules.trim() !== "") headerText += ` (${sponsorRules})`;
    let headerDiv = document.createElement("div");
    headerDiv.className = "roster-header";
    headerDiv.innerText = headerText;
    rosterDiv.appendChild(headerDiv);
    
    updateAllLists();
    clearAll();
    calculateCurrent();
}

function fillSponsors(){
    const select = document.getElementById("sponsorSelect");
    select.innerHTML = "";
    Object.keys(sponsorsDB).forEach(sp => {
        let opt = document.createElement("option");
        opt.value = sp;
        opt.innerText = sp;
        select.appendChild(opt);
    });
    select.value = "Без Спонсора";
    onSponsorChange();
}

let total=0;
window.onload = () => {
    fillSponsors();
    updateAllLists();
    calculateCurrent();
};
</script>
</body>
</html>
